name: finallapp
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  image_picker: ^1.0.4
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  firebase_auth_web: ^5.8.14
  cloud_firestore: ^5.6.2
  google_sign_in: ^6.2.2
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  audioplayers: ^5.2.1
  flutter_animate: ^4.2.0
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  connectivity_plus: ^5.0.2
  internet_connection_checker: ^1.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pedometer: ^4.0.1
  permission_handler: ^11.3.1
  crypto: ^3.0.3
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^5.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/user.png
    - assets/user_profile.json

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  image_picker: ^1.0.4
  build_runner: ^2.4.6
  shared_preferences: ^2.2.2
